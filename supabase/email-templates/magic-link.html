<div style="background:#0b0f14;padding:32px 16px;font-family:Arial,sans-serif;">
  <div style="max-width:560px;margin:0 auto;background:#10161f;border:1px solid rgba(255,255,255,0.08);border-radius:24px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.35);">
    <div style="padding:24px 24px 12px;text-align:center;background:radial-gradient(circle at top, rgba(45,212,191,0.18), rgba(16,22,31,0) 60%);">
      <div style="margin:0 auto 12px;font-size:12px;letter-spacing:0.35em;text-transform:uppercase;color:#2dd4bf;">ACTIS</div>
      <h1 style="margin:0;font-size:28px;line-height:1.15;color:#f8fafc;font-weight:700;">Your sign-in code</h1>
    </div>
    <div style="padding:8px 24px 28px;">
      <p style="margin:0 0 18px;font-size:15px;line-height:1.7;color:#cbd5e1;text-align:center;">Use this one-time code to continue in ACTIS.</p>
      <div style="margin:0 0 22px;padding:18px 20px;border-radius:18px;background:linear-gradient(180deg, rgba(45,212,191,0.12), rgba(45,212,191,0.04));border:1px solid rgba(45,212,191,0.25);text-align:center;">
        <div style="font-size:13px;letter-spacing:0.24em;text-transform:uppercase;color:#8be9dc;margin-bottom:8px;">One-time code</div>
        <div style="font-size:34px;line-height:1;font-weight:700;letter-spacing:0.32em;color:#f8fafc;">{{ .Token }}</div>
      </div>
      <p style="margin:0 0 10px;font-size:14px;line-height:1.6;color:#94a3b8;">This code expires shortly for your security.</p>
      <p style="margin:0;font-size:14px;line-height:1.6;color:#94a3b8;">If you did not request this email, you can safely ignore it.</p>
    </div>
  </div>
</div>
